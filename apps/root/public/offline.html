<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balmy — Offline</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #FBFAFF;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #791aff;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
      max-width: 500px;
    }

    button {
      background-color: #791aff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #6015cc;
    }
  </style>
</head>
<body>
  <img src="/favicon.svg" alt="Balmy Logo" class="logo">
  <h1>You're currently offline</h1>
  <p>Sorry, you can't access this page right now because you're not connected to the internet. Please check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>

  <script>
    // Check if the user comes back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
